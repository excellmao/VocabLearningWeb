{% extends "base.html" %}

{% block title %}Login - Vocab App{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="w3-card auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-layer-group" style="font-size: 3rem; color: #04AA6D; margin-bottom: 10px;"></i>
            <h2 style="margin: 0; color: #333;">Welcome Back</h2>
            <p style="color: #666; margin-top: 5px;">Login to continue your learning journey.</p>
        </div>

        <form method="POST" action="">
            {% if form %}
                {{ form.hidden_tag() }}
            {% endif %}
            
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn-block">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 25px; color: #666; font-size: 0.95rem;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: #04AA6D; text-decoration: none; font-weight: bold;">Sign up here</a>.
        </p>
    </div>
</div>
{% endblock %}
