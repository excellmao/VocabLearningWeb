{% extends "base.html" %}

{% block title %}Quiz - Vocab App{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto; padding-top: 20px;">
    <div class="w3-card" style="padding: 40px; text-align: center; min-height: 400px; position: relative;">

        {% for q in quiz_data %}
        <div class="quiz-card" id="card-{{ loop.index0 }}" style="display: {% if loop.index0 == 0 %}block{% else %}none{% endif %};">
            <p style="color: #666; font-weight: bold; margin-bottom: 20px; text-transform: uppercase;">Question {{ loop.index }} of {{ quiz_data|length }}</p>
            <h2 style="font-size: 2.5rem; margin-bottom: 40px; color: #333;">{{ q.target_term }}</h2>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                {% for opt in q.options %}
                <button data-id="{{ opt.id }}"
                        onclick="selectOption(this, {{ opt.id }}, {{ q.correct_id }}, {{ q.progress_id }})"
                        class="btn"
                        style="width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; text-align: left; transition: all 0.2s ease;">
                    {{ opt.def }}
                </button>
                {% endfor %}
            </div>
        </div>
        {% endfor %}

    </div>
</div>

<script>
    let currentIndex = 0;
    const quizData = {{ quiz_data | tojson | safe }};
    const results = [];

    function showCard(index) {
        document.querySelectorAll('.quiz-card').forEach((card, i) => {
            card.style.display = i === index ? 'block' : 'none';
        });
    }

    function selectOption(button, optionId, correctId, progressId) {
        const card = button.closest('.quiz-card');
        const buttons = card.querySelectorAll('button');

        // Disable all buttons so the user can't click twice
        buttons.forEach(btn => {
            btn.disabled = true;
            btn.style.cursor = 'default';
        });

        const isCorrect = (optionId === correctId);

        if (isCorrect) {
            button.style.backgroundColor = '#04AA6D'; // Green
            button.style.color = 'white';
            button.style.borderColor = '#038857';
        } else {
            button.style.backgroundColor = '#f44336'; // Red
            button.style.color = 'white';
            button.style.borderColor = '#d32f2f';

            // THE FIX: Check the exact data-id attribute instead of the onclick string!
            buttons.forEach(btn => {
                if (parseInt(btn.getAttribute('data-id')) === correctId) {
                    btn.style.backgroundColor = '#04AA6D';
                    btn.style.color = 'white';
                    btn.style.border = '2px solid #038857';
                }
            });
        }

        results.push({
            progress_id: progressId,
            is_correct: isCorrect,
            term: quizData[currentIndex].target_term,
            options: quizData[currentIndex].options,
            correct_id: correctId,
            selected_id: optionId
        });

        setTimeout(() => {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                showCard(currentIndex);
            } else {
                submitQuiz();
            }
        }, 1500);
    }

    function submitQuiz() {
        fetch('{{ url_for("submit_quiz_batch") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ results: results })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                window.location.href = data.redirect_url;
            }
        });
    }
</script>
{% endblock %}
