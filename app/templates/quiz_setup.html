{% extends "base.html" %}

{% block title %}Quiz Setup - Vocab App{% endblock %}

{% block content %}
<div class="w3-card" style="max-width: 600px; margin: 40px auto; padding: 30px;">
    <h2 style="text-align: center; margin-bottom: 30px;">Quiz Settings</h2>
    <form action="{{ url_for('quiz_run') }}" method="POST">

        <div style="margin-bottom: 25px; text-align: left;">
            <label style="font-weight: bold; display: block; margin-bottom: 10px;">Select Topics:</label>
            <div class="checkbox-group" style="background: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #ccc; max-height: 180px; overflow-y: auto;">

                <div style="margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #ddd;">
                    <input type="checkbox" id="topic_all" name="topic_ids" value="all" checked class="topic-checkbox">
                    <label for="topic_all" style="margin-left: 8px; font-weight: bold;">All Enrolled Topics</label>
                </div>

                {% for topic in topics %}
                <div style="margin-bottom: 8px;">
                    <input type="checkbox" id="topic_{{ topic.id }}" name="topic_ids" value="{{ topic.id }}" class="topic-checkbox specific-topic">
                    <label for="topic_{{ topic.id }}" style="margin-left: 8px;">{{ topic.name }}</label>
                </div>
                {% endfor %}
            </div>
        </div>

        <div style="margin-bottom: 30px; text-align: left;">
            <label style="font-weight: bold; display: block; margin-bottom: 10px;">Number of Questions:</label>
            <select name="question_count" class="form-control" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="10">10 Questions</option>
                <option value="20">20 Questions</option>
                <option value="30">30 Questions</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1.1rem; background-color: #04AA6D; border: none; color: white; border-radius: 5px; cursor: pointer;">Start Quiz</button>
    </form>
</div>

<script>
    const allCheckbox = document.getElementById('topic_all');
    const specificCheckboxes = document.querySelectorAll('.specific-topic');

    allCheckbox.addEventListener('change', function() {
        if (this.checked) {
            specificCheckboxes.forEach(cb => cb.checked = false);
        }
    });

    specificCheckboxes.forEach(cb => {
        cb.addEventListener('change', function() {
            if (this.checked) {
                allCheckbox.checked = false;
            }
        });
    });
</script>
{% endblock %}
