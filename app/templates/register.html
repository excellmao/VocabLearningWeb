{% extends "base.html" %}

{% block title %}Register - Vocab App{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="w3-card auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-user-plus" style="font-size: 3rem; color: #04AA6D; margin-bottom: 10px;"></i>
            <h2 style="margin: 0; color: #333;">Create an Account</h2>
            <p style="color: #666; margin-top: 5px;">Start mastering your vocabulary today.</p>
        </div>

        <form method="POST" action="">
            {% if form %}
                {{ form.hidden_tag() }}
            {% endif %}
            
            <div class="form-group">
                <label class="form-label" for="username">Choose a Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Create a Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
            </div>
        
            <button type="submit" class="btn-block">Sign Up</button>
        </form>
        
        <p style="text-align: center; margin-top: 25px; color: #666; font-size: 0.95rem;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: #04AA6D; text-decoration: none; font-weight: bold;">Login here</a>.
        </p>
    </div>
</div>
{% endblock %}
